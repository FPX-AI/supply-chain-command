name: Update Stock Prices

on:
  schedule:
    # Run daily at 9:30 PM UTC (after US market close at 4pm ET)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest prices
        run: node update-prices.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/prices.json
          git diff --staged --quiet || git commit -m "chore: update stock prices $(date -u +%Y-%m-%d)"
          git push
